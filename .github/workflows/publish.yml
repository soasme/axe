name: Release

# Pushing a tag like v0.1.0 builds the runtime stubs, runs the full test
# suite, and publishes the wheel + sdist to PyPI via trusted publishing
# (configure the publisher at https://pypi.org/manage/account/publishing/ —
# no API token/secret is needed).
on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Check tag matches package version
        run: |
          version="$(uv version --short)"
          if [ "${GITHUB_REF_NAME}" != "v${version}" ]; then
            echo "tag ${GITHUB_REF_NAME} does not match pyproject version ${version}" >&2
            exit 1
          fi

      - name: Run Go runtime tests
        working-directory: runtime
        run: |
          go vet ./...
          go test ./...

      - name: Build runtime stubs (all platforms)
        run: python scripts/build_stubs.py

      - name: Run Python tests (unit + e2e)
        run: uv run pytest

      - name: Build wheel and sdist
        run: uv build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/axe
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
