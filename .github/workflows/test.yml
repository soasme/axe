name: Tests

# Runs on every pull request and every push to main: lint (pre-commit, i.e.
# ruff check + format), Go runtime tests, then the Python suite — unit tests
# plus the end-to-end tests, which need the runtime stubs built first.
on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Run pre-commit on all files
        run: uvx pre-commit run --all-files --show-diff-on-failure

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Run Go runtime tests
        working-directory: runtime
        run: |
          go vet ./...
          go test ./...

      - name: Build runtime stubs (all platforms)
        run: python scripts/build_stubs.py

      - name: Run Python tests (unit + e2e)
        run: uv run pytest
